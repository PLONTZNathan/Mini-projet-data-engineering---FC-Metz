services:
  db:
    image: postgres:16
    container_name: fc_metz_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fc_metz_mini_projet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_datestyle.sql:/docker-entrypoint-initdb.d/init_datestyle.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pipeline:
    build: .
    container_name: fc_metz_pipeline
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: fc_metz_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fc-metz.fr
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data: